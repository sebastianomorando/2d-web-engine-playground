<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Renderer Playground</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="viewport-wrap" aria-label="2D renderer canvas">
        <canvas id="renderer" width="1280" height="720"></canvas>
        <div class="hud">
          <span id="backend">initializing</span>
          <span id="fps">0 fps</span>
          <span id="asset-count">0 layers</span>
        </div>
      </section>
      <aside class="panel">
        <h1>Fabulab Scene</h1>
        <label>
          Parallax
          <input id="parallax" type="range" min="0" max="2" step="0.01" value="0.10" />
          <output id="parallax-value">0.10</output>
        </label>
        <label>
          Camera Zoom
          <input id="camera-zoom" type="range" min="0.65" max="1.6" step="0.01" value="1" />
          <output id="camera-zoom-value">1.00</output>
        </label>
        <label>
          Light FX
          <input id="lighting" type="range" min="0" max="1" step="0.01" value="0.55" />
          <output id="lighting-value">0.55</output>
        </label>
        <label>
          Paper FX
          <input id="paper" type="range" min="0" max="1" step="0.01" value="0.68" />
          <output id="paper-value">0.68</output>
        </label>
        <label>
          Day Cycle
          <input id="day-cycle" type="range" min="0" max="4" step="0.05" value="1" />
          <output id="day-cycle-value">1.00x</output>
        </label>
        <label>
          Drift
          <input id="drift" type="range" min="0" max="2" step="0.05" value="0.55" />
          <output id="drift-value">0.55</output>
        </label>
        <label>
          Entrance
          <input id="entrance" type="range" min="0" max="1" step="0.01" value="1" />
          <output id="entrance-value">1.00</output>
        </label>
      </aside>
    </main>
  </body>
</html>
